name: KushFC Daily Results

on:
  schedule:
    - cron: '0 9 * * *' # ירוץ כל יום ב-9 בבוקר
  workflow_dispatch: # כפתור להפעלה ידנית

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python Script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python main.py

     - name: Upload Branded Images
        uses: actions/upload-artifact@v4
        with:
          name: KushFC-Final-Posts
          path: la_liga_post_*.jpg # זה יתפוס רק את הפוסטים המוכנים, לא את הרקע
